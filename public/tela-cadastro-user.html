<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">

</head>

<body id="login-corpo">
    <header>


        <nav>




        </nav>


    </header>



    <main>
        <main id="login-area">
            <div class="caixa-login">

                <form id="form-login">
                    <h2 id="titulo">Cadastro Usuário</h2>


                    <div id="c-email" class="conjunto">
                        <label for="email" class="label-form">Email:</label>
                        <input type="email" class="caixa-escrita" id="email" placeholder="Email" required>
                    </div>
                    <div id="c-senha" class="conjunto">
                        <label for="senha" class="label-form">Senha:</label>
                        <input type="password" class="caixa-escrita" id="senha" placeholder="Senha" required>

                    </div>

                    <button id="botao-envio" type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>

                <div id="mensagem"></div>

                <div class="linha"></div>

                <div class="toogle" id="toogle">
                    <p>Não tem conta? Cadastre-se</p>
                </div>
            
            </div>

        </main>

    </main>
    <footer>

    </footer>


    <script src= "scripts/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
